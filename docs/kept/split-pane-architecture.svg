<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="JetBrains Mono, Menlo, monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0392b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2980b9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Split Pane Architecture — Current State</text>
  <text x="550" y="50" text-anchor="middle" fill="#888" font-size="11">Ownership, data flow, and where it gets tangled</text>

  <!-- ═══════════════ APP BOX ═══════════════ -->
  <rect x="30" y="70" width="1040" height="310" rx="6" fill="#16213e" stroke="#2c3e50" stroke-width="2"/>
  <text x="50" y="92" fill="#e74c3c" font-size="13" font-weight="bold">App  (orchestrator — app/app.cpp)</text>

  <!-- SplitLayout -->
  <rect x="60" y="110" width="280" height="120" rx="4" fill="#1a1a2e" stroke="#e67e22" stroke-width="1.5"/>
  <text x="72" y="130" fill="#e67e22" font-size="11" font-weight="bold">SplitLayout</text>
  <text x="72" y="148" fill="#bbb" font-size="10">vector&lt;SplitPane&gt; panes</text>
  <text x="72" y="162" fill="#bbb" font-size="10">  .pane_id, .descriptor {x,y,w,h}</text>
  <text x="72" y="176" fill="#e74c3c" font-size="10" font-weight="bold">int focused_pane_index  ← FOCUS #1</text>
  <text x="72" y="194" fill="#888" font-size="10">set_single() / set_vertical_2()</text>
  <text x="72" y="208" fill="#888" font-size="10">hit_test(px, py) → pane index</text>
  <text x="72" y="222" fill="#f39c12" font-size="9">Flat array — not a tree</text>

  <!-- HostManager -->
  <rect x="380" y="110" width="320" height="120" rx="4" fill="#1a1a2e" stroke="#3498db" stroke-width="1.5"/>
  <text x="392" y="130" fill="#3498db" font-size="11" font-weight="bold">HostManager</text>
  <text x="392" y="148" fill="#bbb" font-size="10">vector&lt;HostSlot&gt; slots_</text>
  <text x="392" y="162" fill="#bbb" font-size="10">  [0] → IHost (nvim/megacity/zsh)</text>
  <text x="392" y="176" fill="#e74c3c" font-size="10" font-weight="bold">int focused_slot_       ← FOCUS #2</text>
  <text x="392" y="194" fill="#888" font-size="10">create() / add_slot() / remove_slot()</text>
  <text x="392" y="208" fill="#888" font-size="10">host_at(i), focused_host()</text>
  <text x="392" y="222" fill="#f39c12" font-size="9">Assumes slot_index == pane_index</text>

  <!-- InputDispatcher -->
  <rect x="740" y="110" width="300" height="120" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="752" y="130" fill="#9b59b6" font-size="11" font-weight="bold">InputDispatcher</text>
  <text x="752" y="148" fill="#bbb" font-size="10">SplitLayout* (borrowed)</text>
  <text x="752" y="162" fill="#bbb" font-size="10">HostManager* (borrowed)</text>
  <text x="752" y="176" fill="#bbb" font-size="10">host_for_mouse_pos() → IHost*</text>
  <text x="752" y="194" fill="#e74c3c" font-size="10" font-weight="bold">Side-effect: updates focus!</text>
  <text x="752" y="208" fill="#888" font-size="10">on_mouse_{move,button,wheel}</text>
  <text x="752" y="222" fill="#f39c12" font-size="9">Modifies SplitLayout focus directly</text>

  <!-- App methods -->
  <rect x="60" y="245" width="980" height="120" rx="4" fill="#0f3460" stroke="#2c3e50" stroke-width="1"/>
  <text x="72" y="265" fill="#e0e0e0" font-size="11" font-weight="bold">App Methods (the glue)</text>

  <text x="72" y="285" fill="#2ecc71" font-size="10">split_vertical()</text>
  <text x="72" y="299" fill="#888" font-size="9">  layout.set_vertical_2() → host_at(0).set_viewport() → host_mgr.add_slot() → set focus x2</text>

  <text x="72" y="319" fill="#2ecc71" font-size="10">on_resize()</text>
  <text x="72" y="333" fill="#888" font-size="9">  renderer.resize() → layout.set_vertical_2() → for each pane: host.set_viewport()</text>

  <text x="550" y="285" fill="#2ecc71" font-size="10">close_pane()</text>
  <text x="550" y="299" fill="#888" font-size="9">  host_mgr.remove_slot() → layout.set_single() → host_at(0).set_viewport()</text>

  <text x="550" y="319" fill="#2ecc71" font-size="10">viewport_for_pane(pane_id)</text>
  <text x="550" y="333" fill="#888" font-size="9">  Finds pane in layout → computes HostViewport from PaneDescriptor + cell metrics</text>

  <text x="550" y="353" fill="#e74c3c" font-size="9" font-weight="bold">  Viewport calculation scattered across 3+ methods — no single entry point</text>

  <!-- ═══════════════ HOST LAYER ═══════════════ -->
  <rect x="30" y="400" width="520" height="180" rx="6" fill="#16213e" stroke="#2c3e50" stroke-width="2"/>
  <text x="50" y="422" fill="#2ecc71" font-size="13" font-weight="bold">Host Layer  (libs/draxul-host/)</text>

  <!-- GridHostBase -->
  <rect x="60" y="435" width="220" height="130" rx="4" fill="#1a1a2e" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="72" y="455" fill="#2ecc71" font-size="11" font-weight="bold">GridHostBase</text>
  <text x="72" y="473" fill="#bbb" font-size="10">HostViewport viewport_</text>
  <text x="72" y="487" fill="#bbb" font-size="10">IGridHandle* grid_handle_</text>
  <text x="72" y="505" fill="#888" font-size="10">set_viewport(vp):</text>
  <text x="72" y="519" fill="#888" font-size="9">  → grid_handle_.set_viewport()</text>
  <text x="72" y="533" fill="#888" font-size="9">  → on_viewport_changed()</text>
  <text x="72" y="551" fill="#27ae60" font-size="9">No pane awareness — just a viewport</text>

  <!-- MegaCityHost -->
  <rect x="310" y="435" width="220" height="130" rx="4" fill="#1a1a2e" stroke="#e67e22" stroke-width="1.5"/>
  <text x="322" y="455" fill="#e67e22" font-size="11" font-weight="bold">MegaCityHost (I3DHost)</text>
  <text x="322" y="473" fill="#bbb" font-size="10">HostViewport viewport_</text>
  <text x="322" y="487" fill="#bbb" font-size="10">I3DRenderer* renderer_3d_</text>
  <text x="322" y="505" fill="#888" font-size="10">set_viewport(vp):</text>
  <text x="322" y="519" fill="#888" font-size="9">  → renderer.set_3d_viewport()</text>
  <text x="322" y="537" fill="#888" font-size="10">render_imgui(dt):</text>
  <text x="322" y="551" fill="#888" font-size="9">  → DisplaySize = pane dims</text>

  <!-- ═══════════════ RENDERER LAYER ═══════════════ -->
  <rect x="580" y="400" width="490" height="180" rx="6" fill="#16213e" stroke="#2c3e50" stroke-width="2"/>
  <text x="600" y="422" fill="#e74c3c" font-size="13" font-weight="bold">Renderer  (libs/draxul-renderer/)</text>

  <rect x="610" y="435" width="200" height="130" rx="4" fill="#1a1a2e" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="622" y="455" fill="#e74c3c" font-size="11" font-weight="bold">MetalRenderer</text>
  <text x="622" y="473" fill="#bbb" font-size="10">vector&lt;MetalGridHandle*&gt;</text>
  <text x="622" y="487" fill="#bbb" font-size="10">viewport3d_{x,y,w,h}</text>
  <text x="622" y="505" fill="#888" font-size="10">end_frame():</text>
  <text x="622" y="519" fill="#888" font-size="9">  for each handle:</text>
  <text x="622" y="533" fill="#888" font-size="9">    setScissorRect(descriptor)</text>
  <text x="622" y="547" fill="#888" font-size="9">    draw BG + FG quads</text>
  <text x="622" y="561" fill="#27ae60" font-size="9">No pane count awareness</text>

  <rect x="840" y="435" width="200" height="85" rx="4" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="852" y="455" fill="#9b59b6" font-size="11" font-weight="bold">MetalGridHandle</text>
  <text x="852" y="473" fill="#bbb" font-size="10">PaneDescriptor descriptor_</text>
  <text x="852" y="487" fill="#bbb" font-size="10">RendererState state_</text>
  <text x="852" y="501" fill="#bbb" font-size="10">MTLBuffer* cell_buffer_</text>
  <text x="852" y="515" fill="#27ae60" font-size="9">One per host slot</text>

  <!-- ═══════════════ ARROWS ═══════════════ -->
  <!-- App → SplitLayout -->
  <line x1="200" y1="245" x2="200" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- App → HostManager -->
  <line x1="540" y1="245" x2="540" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- App → InputDispatcher -->
  <line x1="890" y1="245" x2="890" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- App → GridHostBase -->
  <line x1="170" y1="365" x2="170" y2="433" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="105" y="404" fill="#3498db" font-size="9">set_viewport()</text>

  <!-- App → MegaCityHost -->
  <line x1="420" y1="365" x2="420" y2="433" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- HostManager → Host (owns) -->
  <line x1="540" y1="230" x2="540" y2="380" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="540" y1="380" x2="280" y2="435" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="360" y="397" fill="#3498db" font-size="9">owns IHost*</text>

  <!-- GridHostBase → MetalGridHandle -->
  <line x1="280" y1="500" x2="840" y2="475" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520" y="475" fill="#2ecc71" font-size="9">grid_handle_→set_viewport(PaneDescriptor)</text>

  <!-- MegaCityHost → Renderer -->
  <line x1="530" y1="520" x2="608" y2="500" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="500" fill="#e67e22" font-size="9">set_3d_viewport</text>

  <!-- InputDispatcher → SplitLayout (side effect) -->
  <path d="M 740 180 Q 690 180 690 170 Q 690 160 340 170" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="440" y="158" fill="#c0392b" font-size="9">mutates focused_pane_index</text>

  <!-- ═══════════════ PROBLEMS BOX ═══════════════ -->
  <rect x="30" y="600" width="520" height="305" rx="6" fill="#2c1810" stroke="#c0392b" stroke-width="2"/>
  <text x="50" y="625" fill="#e74c3c" font-size="13" font-weight="bold">Problems for Recursive Splits</text>

  <text x="50" y="650" fill="#e74c3c" font-size="11">1. SplitLayout is a flat array, not a tree</text>
  <text x="60" y="666" fill="#bbb" font-size="10">Can't represent: pane A split into (B, C), then C split into (D, E)</text>
  <text x="60" y="680" fill="#bbb" font-size="10">set_vertical_2() is hardcoded for exactly 2 panes</text>

  <text x="50" y="702" fill="#e74c3c" font-size="11">2. Dual focus tracking</text>
  <text x="60" y="718" fill="#bbb" font-size="10">SplitLayout.focused_pane_index + HostManager.focused_slot_</text>
  <text x="60" y="732" fill="#bbb" font-size="10">Manually synchronized in 3+ places — will drift</text>

  <text x="50" y="754" fill="#e74c3c" font-size="11">3. pane_id == slot_index (implicit)</text>
  <text x="60" y="770" fill="#bbb" font-size="10">No explicit mapping. Breaks when panes are closed/reordered.</text>
  <text x="60" y="784" fill="#bbb" font-size="10">close_pane() erases from vector — indices shift</text>

  <text x="50" y="806" fill="#e74c3c" font-size="11">4. Viewport calc scattered across App</text>
  <text x="60" y="822" fill="#bbb" font-size="10">current_host_viewport(), viewport_for_pane(), on_resize(),</text>
  <text x="60" y="836" fill="#bbb" font-size="10">split_vertical(), close_pane() — each recomputes differently</text>

  <text x="50" y="858" fill="#e74c3c" font-size="11">5. No resize handles / no horizontal split</text>
  <text x="60" y="874" fill="#bbb" font-size="10">set_vertical_2() divides 50/50 with no user-adjustable ratio</text>
  <text x="60" y="888" fill="#bbb" font-size="10">No hit-test for divider drag, no horizontal equivalent</text>

  <!-- ═══════════════ NEEDED BOX ═══════════════ -->
  <rect x="580" y="600" width="490" height="305" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="625" fill="#2ecc71" font-size="13" font-weight="bold">What Recursive Splits Need</text>

  <text x="600" y="650" fill="#2ecc71" font-size="11">1. Binary split tree (replaces flat array)</text>
  <text x="610" y="666" fill="#bbb" font-size="10">Each node: Split(dir, ratio, left, right) | Leaf(host_id)</text>
  <text x="610" y="680" fill="#bbb" font-size="10">Tree computes all PaneDescriptors recursively</text>

  <text x="600" y="702" fill="#2ecc71" font-size="11">2. Single focus owner</text>
  <text x="610" y="718" fill="#bbb" font-size="10">SplitTree owns focused leaf. HostManager just stores hosts.</text>
  <text x="610" y="732" fill="#bbb" font-size="10">One source of truth — no sync needed</text>

  <text x="600" y="754" fill="#2ecc71" font-size="11">3. Explicit leaf_id → host mapping</text>
  <text x="610" y="770" fill="#bbb" font-size="10">SplitTree leaf IDs are stable (not vector indices)</text>
  <text x="610" y="784" fill="#bbb" font-size="10">HostManager keyed by leaf_id, not slot index</text>

  <text x="600" y="806" fill="#2ecc71" font-size="11">4. Tree-driven viewport cascade</text>
  <text x="610" y="822" fill="#bbb" font-size="10">On resize/split: tree.recompute(total_w, total_h)</text>
  <text x="610" y="836" fill="#bbb" font-size="10">Walk leaves → set_viewport() on each host. One code path.</text>

  <text x="600" y="858" fill="#2ecc71" font-size="11">5. Divider hit-testing + drag</text>
  <text x="610" y="874" fill="#bbb" font-size="10">Tree nodes store split ratio (0.0–1.0)</text>
  <text x="610" y="888" fill="#bbb" font-size="10">hit_test returns Leaf(pane) | Divider(node, axis)</text>
</svg>